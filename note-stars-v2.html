<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Note Stars">
<title>Note Stars</title>
<style>
  /* ---- base palette (FOXY default) ---- */
  :root{
    --c-C:#FF5A5F; --c-D:#FF9F40; --c-E:#F4C20D; --c-F:#5BC46B;
    --c-G:#37B9E5; --c-A:#6C7BFF; --c-B:#C45BD6;
    --font:"Chalkboard SE","Comic Sans MS","Marker Felt",-apple-system,system-ui,sans-serif;
    --ink:#2b2350; --paper:#fffdf7;
    --bg:radial-gradient(120% 80% at 10% 0%, #ffe9d6 0%, transparent 55%),
        radial-gradient(120% 90% at 95% 10%, #e7d6ff 0%, transparent 55%),
        linear-gradient(180deg, #fff7ee 0%, #cdeafd 100%);
    --brand1:#FF5A5F; --brand2:#37B9E5; --brand3:#C45BD6;
    --bubbleBg:#fff; --bubbleInk:#2b2350; --pillBg:#fff;
    --accentA:#5BC46B; --accentB:#37B9E5; --switchOn:#5BC46B;
    --panelGlow:rgba(40,20,90,.4);
  }
  body[data-theme="formal"]{
    --font:"Didot","Playfair Display",Georgia,"Times New Roman",serif;
    --ink:#241c40; --paper:#fdf7e8;
    --bg:radial-gradient(120% 90% at 50% -10%, #2a2f63 0%, transparent 60%),
        radial-gradient(90% 70% at 50% 120%, #3a2f17 0%, transparent 60%),
        linear-gradient(180deg,#0c0f2a 0%, #16193f 100%);
    --brand1:#d4af37; --brand2:#f6e7a8; --brand3:#caa84a;
    --bubbleBg:#fff; --bubbleInk:#241c40; --pillBg:#fff;
    --accentA:#caa84a; --accentB:#8a6f2e; --switchOn:#caa84a; --panelGlow:rgba(0,0,0,.6);
  }
  body[data-theme="punk"]{
    --font:"Arial Black","Arial Narrow Bold",Impact,system-ui,sans-serif;
    --ink:#0d0d10; --paper:#ffffff;
    --bg:radial-gradient(60% 50% at 15% 10%, #ff1f8e55 0%, transparent 60%),
        radial-gradient(60% 50% at 85% 20%, #39ff1444 0%, transparent 60%),
        radial-gradient(70% 60% at 50% 110%, #00e5ff44 0%, transparent 60%),
        repeating-linear-gradient(45deg,#0d0d10 0 22px,#141418 22px 44px);
    --brand1:#ff1f8e; --brand2:#39ff14; --brand3:#00e5ff;
    --bubbleBg:#0d0d10; --bubbleInk:#39ff14; --pillBg:#16161c;
    --accentA:#ff1f8e; --accentB:#7a00ff; --switchOn:#39ff14; --panelGlow:rgba(255,31,142,.5);
  }
  body[data-theme="forest"]{
    --font:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --ink:#3a4a32; --paper:#fbf7ea;
    --bg:radial-gradient(100% 70% at 20% 0%, #fdf6df 0%, transparent 55%),
        radial-gradient(120% 80% at 90% 10%, #d4ead8 0%, transparent 55%),
        linear-gradient(180deg,#eaf4e1 0%, #cfe6ef 100%);
    --brand1:#7faf5e; --brand2:#9cc3cf; --brand3:#cdb27a;
    --bubbleBg:#fff; --bubbleInk:#3a4a32; --pillBg:#fff;
    --accentA:#8bbf6e; --accentB:#6fa8b0; --switchOn:#8bbf6e; --panelGlow:rgba(60,90,50,.4);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden;}
  body{ font-family:var(--font); color:var(--ink); background:var(--bg); background-attachment:fixed;
    user-select:none; -webkit-user-select:none; touch-action:manipulation; transition:background .4s ease,color .3s ease;}
  #app{height:100dvh; height:100vh; display:flex; flex-direction:column; padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}

  header{display:flex; align-items:center; justify-content:space-between; padding:8px 16px; z-index:3;}
  .brand{font-weight:bold; font-size:clamp(20px,4.5vw,30px); letter-spacing:.5px;
    background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand3)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .scorebox{display:flex; gap:10px; align-items:center;}
  .pill{background:var(--pillBg); border:none; border-radius:999px; padding:6px 14px; font-weight:bold; font-size:clamp(15px,3.5vw,20px);
    box-shadow:0 6px 0 rgba(0,0,0,.12); display:flex; align-items:center; gap:6px;}
  .pill.star{color:#f4a900;} .pill.streak{color:#ff5a8a;}
  .pill.pop{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
  .gear{font-size:26px; background:var(--pillBg); border:none; border-radius:50%; width:46px; height:46px; box-shadow:0 5px 0 rgba(0,0,0,.12); cursor:pointer;}

  main{flex:1; display:flex; align-items:center; justify-content:center; padding:4px 14px; z-index:2; min-height:0;}
  .stage{display:flex; align-items:center; justify-content:center; gap:clamp(6px,2vw,28px); flex-wrap:wrap; width:100%; max-width:820px;}
  .staffcard{background:var(--paper); border-radius:28px; padding:10px 18px;
    box-shadow:0 16px 40px rgba(0,0,0,.18), inset 0 0 0 4px rgba(255,255,255,.5); position:relative;}
  .staffcard.wiggle{animation:wiggle .4s ease;}
  @keyframes wiggle{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px) rotate(-1deg)}60%{transform:translateX(8px) rotate(1deg)}}
  .clefword{position:absolute; top:8px; right:16px; font-size:13px; font-weight:bold; opacity:.45; letter-spacing:1px; text-transform:uppercase;}
  svg.staff{display:block; width:min(64vw,300px); height:auto;}

  .buddy{width:clamp(96px,20vw,150px); animation:bob 3s ease-in-out infinite; transform-origin:bottom center; filter:drop-shadow(0 8px 8px rgba(0,0,0,.12));}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
  .buddy.cheer{animation:cheer .6s ease;}
  @keyframes cheer{0%{transform:scale(1)}30%{transform:scale(1.18) rotate(-6deg)}60%{transform:scale(1.18) rotate(6deg)}100%{transform:scale(1)}}
  .bubble{position:relative; background:var(--bubbleBg); color:var(--bubbleInk); border-radius:18px; padding:8px 14px; font-weight:bold; font-size:clamp(15px,3.6vw,21px);
    box-shadow:0 8px 0 rgba(0,0,0,.1); min-width:90px; text-align:center; min-height:20px;}
  .bubble:after{content:""; position:absolute; left:24px; bottom:-12px; border:8px solid transparent; border-top-color:var(--bubbleBg); border-bottom:0;}
  .buddywrap{display:flex; flex-direction:column; align-items:center; gap:6px;}

  .answerwrap{padding:8px 10px 18px; z-index:3;}
  .piano{position:relative; height:clamp(96px,20vh,150px); max-width:920px; margin:0 auto; width:100%; display:flex;}
  .wkey{flex:1 1 0; min-width:0; background:linear-gradient(#ffffff,#f1ede4); border:1px solid #d8d2c4; border-top:none;
    border-radius:0 0 10px 10px; box-shadow:0 7px 0 rgba(0,0,0,.13), inset 0 -10px 10px rgba(0,0,0,.04);
    position:relative; cursor:pointer; display:flex; align-items:flex-end; justify-content:center; padding-bottom:9px;}
  .wkey:active,.wkey.press{transform:translateY(5px); box-shadow:0 2px 0 rgba(0,0,0,.13);}
  .wkey.glow{animation:glow .8s ease infinite; z-index:6;}
  .wlabel{font-weight:bold; line-height:1;}
  .wkey.midc{background:linear-gradient(#fff6d0,#ffe7a0);}
  .midmark{position:absolute; top:7px; left:50%; transform:translateX(-50%); width:10px; height:10px; border-radius:50%; background:#f0a500; box-shadow:0 0 0 2px #fff,0 1px 2px rgba(0,0,0,.45);}
  .wkey.lh{background:linear-gradient(#cfe4ff 0%,#e9f3ff 30%,#ffffff 58%,#f1ede4 100%);}
  .wkey.rh{background:linear-gradient(#ffe1c4 0%,#fff1e2 30%,#ffffff 58%,#f1ede4 100%);}
  .bkey{position:absolute; top:0; height:62%; background:linear-gradient(#403a5a,#15111f);
    border:1px solid #000; border-top:none; border-radius:0 0 5px 5px; box-shadow:0 5px 0 rgba(0,0,0,.45); z-index:7; cursor:pointer;}
  .bkey:active,.bkey.press{transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.45);}
  @keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18); transform:translateY(-3px)}}
  .namepad{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; max-width:760px; margin:0 auto; width:100%;}
  .namebtn{flex:1 1 0; min-width:62px; max-width:104px; height:clamp(74px,16vh,118px); border:none; border-radius:18px;
    color:#fff; font-weight:bold; font-size:clamp(18px,4.4vw,30px); cursor:pointer;
    box-shadow:0 7px 0 rgba(0,0,0,.18), inset 0 5px 0 rgba(255,255,255,.4); display:flex; align-items:center; justify-content:center;
    text-shadow:0 1px 2px rgba(0,0,0,.18);}
  .namebtn:active,.namebtn.press{transform:translateY(5px); box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .namebtn.glow{animation:glow .8s ease infinite;}

  /* rotate hint */
  #rotateHint{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 12px); transform:translateX(-50%);
    background:var(--bubbleBg); color:var(--bubbleInk); font-weight:bold; padding:9px 16px; border-radius:999px;
    box-shadow:0 8px 24px rgba(0,0,0,.25); z-index:14; font-size:14px; display:none; align-items:center; gap:8px;}
  #rotateHint.show{display:flex; animation:nudge 1.6s ease-in-out infinite;}
  @keyframes nudge{0%,100%{transform:translateX(-50%) rotate(0)}50%{transform:translateX(-50%) rotate(8deg)}}

  /* overlay / panel */
  .overlay{position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; padding:18px;
    background:rgba(20,15,40,.5); backdrop-filter:blur(7px);}
  .overlay.hidden{display:none;}
  .panel{background:var(--paper); color:var(--ink); border-radius:30px; padding:22px 20px; width:min(460px,94vw); text-align:center;
    box-shadow:0 24px 60px var(--panelGlow); max-height:92vh; overflow:auto;}
  .panel h1{margin:4px 0 2px; font-size:clamp(28px,7vw,40px);
    background:linear-gradient(90deg,var(--brand1),var(--brand2),var(--brand3)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .panel .sub{margin:2px 0 14px; opacity:.7; font-size:14px;}
  .group{margin:12px 0; text-align:left;}
  .group > .lab{font-weight:bold; font-size:13px; opacity:.6; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block;}
  .choices{display:flex; gap:8px; flex-wrap:wrap;}
  .choice{flex:1 1 0; min-width:84px; background:#fff; border:3px solid #e8e2f0; border-radius:15px; padding:11px 8px; font-weight:bold;
    font-size:15px; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,.06); transition:.12s; font-family:inherit; color:#2b2350;}
  .choice.on{border-color:var(--accentB); background:#f3f9ff; transform:translateY(-2px); box-shadow:0 7px 0 rgba(0,0,0,.12);}
  /* theme cards */
  .themes{display:flex; gap:10px; overflow-x:auto; padding:4px 2px 8px; -webkit-overflow-scrolling:touch;}
  .tcard{flex:0 0 auto; width:92px; background:#fff; border:3px solid #e8e2f0; border-radius:18px; padding:12px 8px; cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.07); transition:.14s; color:#2b2350;}
  .tcard .em{font-size:30px; line-height:1.1;}
  .tcard .nm{font-weight:bold; font-size:13px; margin-top:4px;}
  .tcard.on{border-color:var(--accentA); transform:translateY(-3px) scale(1.03); box-shadow:0 9px 0 rgba(0,0,0,.12);}
  .nameinput{width:100%; border:3px solid #e8e2f0; border-radius:15px; padding:11px 14px; font-size:18px; font-family:inherit; text-align:center;}
  .toggle{display:flex; align-items:center; justify-content:space-between; background:#fff; border:3px solid #e8e2f0; border-radius:15px; padding:9px 16px; color:#2b2350;}
  .switch{width:58px; height:32px; border-radius:999px; background:#d9d2ea; position:relative; transition:.2s; cursor:pointer; flex:none;}
  .switch.on{background:var(--switchOn);}
  .switch:after{content:""; position:absolute; top:3px; left:3px; width:26px; height:26px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 2px 4px rgba(0,0,0,.2);}
  .switch.on:after{left:29px;}
  .bigbtn{margin-top:14px; width:100%; border:none; border-radius:20px; padding:15px; font-size:23px; font-weight:bold; color:#fff; font-family:inherit;
    background:linear-gradient(90deg,var(--accentA),var(--accentB)); box-shadow:0 9px 0 rgba(0,0,0,.25); cursor:pointer; letter-spacing:.5px;}
  .bigbtn:active{transform:translateY(5px); box-shadow:0 4px 0 rgba(0,0,0,.25);}
  .moretoggle{margin-top:12px; background:none; border:none; font-family:inherit; font-weight:bold; font-size:15px; color:var(--ink); opacity:.6; cursor:pointer; padding:6px;}
  #moreOpts.collapsed{display:none;}
  #confetti{position:fixed; inset:0; pointer-events:none; z-index:15;}
</style>
</head>
<body data-theme="foxy">
<canvas id="confetti"></canvas>
<div id="app">
  <header>
    <div class="brand">★ Note Stars ★</div>
    <div class="scorebox">
      <div class="pill star" id="starPill">⭐ <span id="score">0</span></div>
      <div class="pill streak" id="streakPill">🔥 <span id="streak">0</span></div>
      <button class="gear" id="gearBtn" aria-label="Settings">⚙️</button>
    </div>
  </header>
  <main>
    <div class="stage">
      <div class="buddywrap">
        <div class="bubble" id="bubble">Let's go!</div>
        <svg class="buddy" id="buddy" viewBox="0 0 120 130"></svg>
      </div>
      <div class="staffcard" id="staffcard">
        <span class="clefword" id="clefword">Treble</span>
        <svg class="staff" id="staff" viewBox="0 0 320 240"></svg>
      </div>
    </div>
  </main>
  <div class="answerwrap"><div id="answer"></div></div>
</div>
<div id="rotateHint">🔄 Turn sideways for the big piano!</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <div id="deco" style="font-size:46px; line-height:1">🎵🦊🎵</div>
    <h1>Note Stars</h1>
    <div class="sub">Pick a look, pick a clef, and play! 🌟</div>

    <div class="group">
      <span class="lab">Theme</span>
      <div class="themes" id="themeCards">
        <div class="tcard on" data-theme="foxy"><div class="em">🦊</div><div class="nm">Foxy</div></div>
        <div class="tcard" data-theme="formal"><div class="em">🎩</div><div class="nm">Mr. Baby</div></div>
        <div class="tcard" data-theme="punk"><div class="em">🤘</div><div class="nm">Punk Rock</div></div>
        <div class="tcard" data-theme="forest"><div class="em">🌿</div><div class="nm">Forest</div></div>
      </div>
    </div>

    <div class="group">
      <span class="lab">Which clef?</span>
      <div class="choices" id="clefChoices">
        <button class="choice on" data-clef="treble">🎼 Treble</button>
        <button class="choice" data-clef="bass">🎵 Bass</button>
        <button class="choice" data-clef="both">✨ Both</button>
      </div>
    </div>


    <div class="group">
      <span class="lab">Difficulty</span>
      <div class="choices" id="levelChoices">
        <button class="choice on" data-level="atoa">🐣 A to A</button>
        <button class="choice" data-level="easy">✋ F to G</button>
        <button class="choice" data-level="staff">🎵 On the staff</button>
        <button class="choice" data-level="ledger">🚀 Ledger notes</button>
        <button class="choice" data-level="wide">🦅 Wide range</button>
      </div>
    </div>

    <button class="bigbtn" id="startBtn">▶︎ Play!</button>
    <button class="moretoggle" id="moreToggle">More options ▾</button>

    <div id="moreOpts" class="collapsed">
      <div class="group">
        <span class="lab">Note names</span>
        <div class="choices" id="nameSysChoices">
          <button class="choice on" data-namesys="abc">🔤 A B C</button>
          <button class="choice" data-namesys="solf">🎶 Do Re Mi</button>
        </div>
      </div>
      <div class="group">
        <span class="lab">How to answer</span>
        <div class="choices" id="modeChoices">
          <button class="choice on" data-mode="keys">🎹 Find the key</button>
          <button class="choice" data-mode="name">🗣️ Name the note</button>
        </div>
      </div>
      <div class="group"><div class="toggle">
        <div><b>Show names on piano</b></div><div class="switch on" id="labelSwitch"></div>
      </div></div>
      <div class="group"><div class="toggle">
        <div><b>Color hints</b></div><div class="switch on" id="hintSwitch"></div>
      </div></div>
      <div class="group"><div class="toggle">
        <div><b>Hand colors (L / R)</b></div><div class="switch on" id="handSwitch"></div>
      </div></div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";
const store={ get(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} } };

const LETTERS=["C","D","E","F","G","A","B"];
const LETTER_IDX={C:0,D:1,E:2,F:3,G:4,A:5,B:6};
const PC={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const COLOR={C:"#FF5A5F",D:"#FF9F40",E:"#F4C20D",F:"#5BC46B",G:"#37B9E5",A:"#6C7BFF",B:"#C45BD6"};
const SOLF={C:"Do",D:"Re",E:"Mi",F:"Fa",G:"So",A:"La",B:"Ti"};
const midiOf=(l,o)=>12*(o+1)+PC[l];
const freqMidi=m=>440*Math.pow(2,(m-69)/12);
const freqOf=(l,o)=>freqMidi(midiOf(l,o));
const dnOf=(l,o)=>o*7+LETTER_IDX[l];
const fromDn=d=>({letter:LETTERS[((d%7)+7)%7],oct:Math.floor(d/7)});

function nr(a,ao,b,bo){ const lo=dnOf(a,ao),hi=dnOf(b,bo),o=[]; for(let d=lo;d<=hi;d++){ const f=fromDn(d); o.push([f.letter,f.oct]); } return o; }
function buildPool(clef,level){
  if(level==="more") level="ledger";  // back-compat
  let T,B;
  if(level==="atoa"){       T=nr("C",4,"A",4); B=nr("A",3,"C",4); }   // A below to A above middle C
  else if(level==="easy"){  T=nr("C",4,"G",4); B=nr("F",3,"C",4); }   // middle C: down to F, up to G
  else if(level==="staff"){ T=nr("E",4,"F",5); B=nr("G",2,"A",3); }   // notes on the staff
  else if(level==="wide"){  T=nr("A",3,"C",6); B=nr("C",2,"E",4); }   // broad, many ledger lines
  else {                    T=nr("C",4,"A",5); B=nr("E",2,"C",4); }   // ledger notes (staff +2)
  const tag=(a,c)=>a.map(([l,o])=>({letter:l,oct:o,clef:c}));
  if(clef==="treble") return tag(T,"treble");
  if(clef==="bass") return tag(B,"bass");
  return tag(T,"treble").concat(tag(B,"bass"));
}
// always >=3 octaves, snapped to C..C, centered around the notes in play
function kbWindow(clef,level){
  const p=buildPool(clef,level); let mn=1e9,mx=-1e9;
  p.forEach(n=>{ const d=dnOf(n.letter,n.oct); if(d<mn)mn=d; if(d>mx)mx=d; });
  const Cfloor=d=>fromDn(d).oct*7;                                 // C at/below
  const Cceil=d=>fromDn(d).letter==="C"? d : (fromDn(d).oct+1)*7;  // C at/above
  let lowDn=Math.min(dnOf("C",3), Cfloor(mn));   // always reach the C below middle C
  let highDn=Math.max(dnOf("C",5), Cceil(mx));   // always reach the C above middle C
  const o=[]; for(let d=lowDn; d<=highDn; d++) o.push(fromDn(d)); return o;
}
function nameLabel(l){ return state.naming==="solf"? SOLF[l] : l; }

/* ---------- mascots ---------- */
function mFox(mood){
  const happy=mood==="happy",think=mood==="think";
  const mouth=happy?'<path d="M44 86 Q60 104 76 86" fill="#7a2f17" stroke="#7a2f17" stroke-width="3" stroke-linecap="round"/>'
    :think?'<circle cx="60" cy="90" r="5" fill="#7a2f17"/>':'<path d="M48 88 Q60 98 72 88" fill="none" stroke="#7a2f17" stroke-width="4" stroke-linecap="round"/>';
  const eyes=happy?'<path d="M40 64 q6 -8 12 0" stroke="#3a2418" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M68 64 q6 -8 12 0" stroke="#3a2418" stroke-width="4" fill="none" stroke-linecap="round"/>'
    :'<circle cx="46" cy="64" r="6" fill="#3a2418"/><circle cx="74" cy="64" r="6" fill="#3a2418"/><circle cx="48" cy="62" r="2" fill="#fff"/><circle cx="76" cy="62" r="2" fill="#fff"/>';
  return '<ellipse cx="60" cy="124" rx="30" ry="6" fill="rgba(0,0,0,.08)"/>'
    +'<path d="M30 40 L20 8 L48 30 Z" fill="#ff8a3d" stroke="#e9701f" stroke-width="2"/><path d="M90 40 L100 8 L72 30 Z" fill="#ff8a3d" stroke="#e9701f" stroke-width="2"/>'
    +'<path d="M30 36 L26 16 L42 30 Z" fill="#ffd9bf"/><path d="M90 36 L94 16 L78 30 Z" fill="#ffd9bf"/>'
    +'<ellipse cx="60" cy="66" rx="38" ry="36" fill="#ff9c4d" stroke="#e9701f" stroke-width="2"/>'
    +'<ellipse cx="60" cy="82" rx="26" ry="22" fill="#fff3e8"/><circle cx="36" cy="78" r="7" fill="#ffc3c3" opacity=".7"/><circle cx="84" cy="78" r="7" fill="#ffc3c3" opacity=".7"/>'
    +eyes+'<ellipse cx="60" cy="78" rx="6" ry="4.5" fill="#3a2418"/>'+mouth

}

const THEMES={
  foxy:{deco:"🎵🦊🎵", mascot:mFox, correct:"sparkle",
    confetti:["#FF5A5F","#FF9F40","#F4C20D","#5BC46B","#37B9E5","#6C7BFF","#C45BD6"],
    praise:["Yay!","Woohoo!","Nice!","Wow!","Awesome!","Great!"], nudge:["Try again!","Almost!","Look closely!","You can do it!"]},
  formal:{deco:"🎩🎼🎩", mascot:mBaby, correct:"musicbox",
    confetti:["#d4af37","#f6e7a8","#ffffff","#caa84a","#0c0f2a"],
    praise:["Magnificent!","Splendid!","Bravo!","Most impressive.","Exquisite!","Quite right!"],
    nudge:["Hmm, observe again.","Not quite, dear.","Do look once more.","A trifle off."]},
  punk:{deco:"🎸🤘🎸", mascot:mPunk, correct:"powerchord",
    confetti:["#ff1f8e","#39ff14","#00e5ff","#ffe600","#ffffff","#ff3b3b"],
    praise:["SHRED IT!","ROCK ON!","RADICAL!","YEAH!!!","LOUD!","RIGHTEOUS!"],
    nudge:["Again, rocker!","Almost!","One more riff!","Nah — retry!"]},
  forest:{deco:"🌿🍃🌿", mascot:mForest, correct:"marimba",
    confetti:["#8bbf6e","#cfe3b5","#f6e7a8","#bfe0e8","#e8d3b0","#a7c98f"],
    praise:["Lovely~","The forest smiles","So gentle~","Wonderful~","Peaceful!","Sweet~"],
    nudge:["Look softly again~","Almost there~","Once more~","Hmm~"]}
};

/* ---------- audio ---------- */
let actx=null;
function audioOn(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended") actx.resume(); }
function tone(f,t0,dur,vol,type){ if(!actx) return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"triangle"; o.frequency.value=f; o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.start(t0); o.stop(t0+dur+0.05); }
function playPitch(f){ audioOn(); if(!actx) return; const t=actx.currentTime; tone(f,t,1.1,0.28,"triangle"); tone(f*2,t,0.7,0.10,"sine"); tone(f*0.5,t,1.1,0.06,"sine"); }
function playNote(l,o){ playPitch(freqOf(l,o)); }
function playCorrect(){ audioOn(); if(!actx) return; const t=actx.currentTime, s=THEMES[state.theme].correct;
  if(s==="powerchord"){ [146.83,220.0,293.66].forEach(f=>{ tone(f,t,0.5,0.14,"sawtooth"); tone(f*1.005,t,0.5,0.10,"sawtooth"); }); tone(880,t+0.04,0.3,0.12,"square"); }
  else if(s==="musicbox"){ [1046.5,1318.5,1568.0,2093.0].forEach((f,i)=>tone(f,t+i*0.08,0.9,0.11,"sine")); }
  else if(s==="marimba"){ [659.25,783.99,987.77,1318.5].forEach((f,i)=>tone(f,t+i*0.06,0.4,0.16,"triangle")); }
  else { [1046.5,1318.5,1568.0,2093.0].forEach((f,i)=>tone(f,t+i*0.07,0.5,0.16,"sine")); } }
function playWrong(){ audioOn(); if(!actx) return; const t=actx.currentTime; tone(196,t,0.18,0.13,"sine"); tone(174.6,t+0.12,0.22,0.13,"sine"); }

/* ---------- theme apply ---------- */
let PRAISE=THEMES.foxy.praise, NUDGE=THEMES.foxy.nudge, mascotFn=mFox, CC=THEMES.foxy.confetti;
const buddy=document.getElementById("buddy"), deco=document.getElementById("deco");
function drawBuddy(mood){ buddy.innerHTML=mascotFn(mood); }
function applyTheme(id){ const th=THEMES[id]||THEMES.foxy; document.body.dataset.theme=id;
  mascotFn=th.mascot; PRAISE=th.praise; NUDGE=th.nudge; CC=th.confetti; deco.textContent=th.deco; drawBuddy("idle"); }

/* ---------- staff ---------- */
const staffSVG=document.getElementById("staff");
const TOP=80, GAP=22, BOTTOM=TOP+4*GAP, NOTEX=232;
const dnBottom=clef=>clef==="treble"?dnOf("E",4):dnOf("G",2);
const noteY=(clef,l,o)=>BOTTOM-(dnOf(l,o)-dnBottom(clef))*(GAP/2);
function renderStaff(n){
  const y=noteY(n.clef,n.letter,n.oct); let ledgers=""; const lx1=NOTEX-20,lx2=NOTEX+20;
  if(y<TOP) for(let ly=TOP-GAP; ly>=y-1; ly-=GAP) ledgers+='<line x1="'+lx1+'" y1="'+ly+'" x2="'+lx2+'" y2="'+ly+'" stroke="#2b2350" stroke-width="3" stroke-linecap="round"/>';
  if(y>BOTTOM) for(let ly=BOTTOM+GAP; ly<=y+1; ly+=GAP) ledgers+='<line x1="'+lx1+'" y1="'+ly+'" x2="'+lx2+'" y2="'+ly+'" stroke="#2b2350" stroke-width="3" stroke-linecap="round"/>';
  let lines=""; for(let i=0;i<5;i++){ const ly=TOP+i*GAP; lines+='<line x1="20" y1="'+ly+'" x2="300" y2="'+ly+'" stroke="#bcb4d6" stroke-width="3" stroke-linecap="round"/>'; }
  let clef = n.clef==="treble"
    ? '<text x="34" y="'+(BOTTOM+18)+'" font-size="150" fill="#2b2350" font-family="Bravura,\'Noto Music\',\'Times New Roman\',serif">\u{1D11E}</text>'
    : '<text x="38" y="'+(TOP+GAP*2+10)+'" font-size="100" fill="#2b2350" font-family="Bravura,\'Noto Music\',\'Times New Roman\',serif">\u{1D122}</text>';
  const headColor = state.colorHint? COLOR[n.letter] : "#2b2350";
  const head='<g transform="rotate(-18 '+NOTEX+' '+y+')"><ellipse cx="'+NOTEX+'" cy="'+y+'" rx="16" ry="12.5" fill="'+headColor+'" stroke="#2b2350" stroke-width="2.5"/></g>';
  staffSVG.innerHTML=lines+ledgers+clef+head;
}

/* ---------- answer area ---------- */
const answerEl=document.getElementById("answer");
function buildAnswer(){
  answerEl.innerHTML="";
  if(state.mode==="name"){
    const pad=document.createElement("div"); pad.className="namepad";
    LETTERS.forEach(L=>{ const b=document.createElement("button"); b.className="namebtn"; b.dataset.letter=L;
      b.style.background=COLOR[L]; b.textContent=nameLabel(L); b.addEventListener("click",()=>onAnswer(L,null,b)); pad.appendChild(b); });
    answerEl.appendChild(pad); updateRotateHint(); return;
  }
  const whites=kbWindow(state.clef,state.level);
  const N=whites.length, lf=Math.max(9,Math.min(18,Math.round(230/N)));
  const piano=document.createElement("div"); piano.className="piano";
  const midDn=dnOf("C",4);
  whites.forEach(w=>{ const k=document.createElement("div"); k.className="wkey"; k.dataset.letter=w.letter; k.dataset.oct=String(w.oct);
    if(w.letter==="C"&&w.oct===4){ k.classList.add("midc"); const m=document.createElement("span"); m.className="midmark"; k.appendChild(m); }
    else if(state.handCue){ k.classList.add(dnOf(w.letter,w.oct)<midDn?"lh":"rh"); }
    if(state.keyLabels){ const s=document.createElement("span"); s.className="wlabel"; s.style.color=COLOR[w.letter]; s.style.fontSize=lf+"px"; s.textContent=nameLabel(w.letter); k.appendChild(s); }
    k.addEventListener("click",()=>onAnswer(w.letter,w.oct,k)); piano.appendChild(k); });
  for(let i=0;i<whites.length-1;i++){
    if(midiOf(whites[i+1].letter,whites[i+1].oct)-midiOf(whites[i].letter,whites[i].oct)===2){
      const bk=document.createElement("div"); bk.className="bkey"; bk.style.width=(62/N)+"%"; bk.style.left=((100*(i+1)-31)/N)+"%";
      const bm=midiOf(whites[i].letter,whites[i].oct)+1; bk.addEventListener("click",e=>{ e.stopPropagation(); onBlack(bm,bk); }); piano.appendChild(bk);
    }
  }
  answerEl.appendChild(piano); updateRotateHint();
}

/* ---------- rotate hint ---------- */
const rotateHint=document.getElementById("rotateHint");
function updateRotateHint(){
  const portrait = window.innerHeight > window.innerWidth;
  const wide = state.mode==="keys" && kbWindow(state.clef,state.level).length>15;
  const playing = document.getElementById("overlay").classList.contains("hidden");
  rotateHint.classList.toggle("show", portrait && wide && playing);
}
window.addEventListener("resize",updateRotateHint);
window.addEventListener("orientationchange",()=>setTimeout(updateRotateHint,200));

/* ---------- game ---------- */
const state={
  theme:store.get("ns2_theme","foxy"),
  clef:store.get("ns2_clef","both"), level:store.get("ns2_level","atoa"),
  naming:store.get("ns2_namesys","abc"), mode:store.get("ns2_mode","keys"),
  keyLabels:store.get("ns2_labels","1")==="1", colorHint:store.get("ns2_hint","1")==="1", handCue:store.get("ns2_hand","1")==="1",
  score:0, streak:0, pool:[], current:null, attempts:0, locked:false
};
if(state.level==="more") state.level="ledger";
const bubble=document.getElementById("bubble"), scoreEl=document.getElementById("score"), streakEl=document.getElementById("streak");
function say(t,m){ bubble.textContent=t; drawBuddy(m||"idle"); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function nextNote(){
  state.attempts=0; state.locked=false;
  let n,g=0; do{ n=pick(state.pool); g++; } while(state.current && n.letter===state.current.letter && n.oct===state.current.oct && g<8);
  state.current=n;
  document.getElementById("clefword").textContent=n.clef==="treble"?"Treble":"Bass";
  renderStaff(n); answerEl.querySelectorAll(".glow").forEach(k=>k.classList.remove("glow"));
  const q=state.mode==="name"?"What note is this?":"Find this note!";
  say(q,"idle");
}
function onAnswer(letter,oct,el){
  if(state.locked||!state.current) return;
  audioOn(); el.classList.add("press"); setTimeout(()=>el.classList.remove("press"),120);
  const right = letter===state.current.letter && (oct===null || oct===state.current.oct);
  if(right){
    state.locked=true; playNote(state.current.letter,state.current.oct); playCorrect();
    state.score++; state.streak++; scoreEl.textContent=state.score; streakEl.textContent=state.streak; bump("starPill");
    let msg; if(state.streak>0 && state.streak%5===0){ msg=state.streak+" in a row! 🎉"; bump("streakPill"); }
    else msg=pick(PRAISE)+" That's "+nameLabel(state.current.letter)+"!";
    say(msg,"happy"); buddy.classList.add("cheer"); setTimeout(()=>buddy.classList.remove("cheer"),600); confetti();
    setTimeout(nextNote,1150);
  }else{
    state.attempts++; playWrong(); state.streak=0; streakEl.textContent=0;
    const close=(oct!==null && letter===state.current.letter)?"Right name — try higher or lower!":pick(NUDGE);
    say(close,"think");
    const card=document.getElementById("staffcard"); card.classList.add("wiggle"); setTimeout(()=>card.classList.remove("wiggle"),420);
    if(state.attempts>=2){
      answerEl.querySelectorAll("[data-letter]").forEach(k=>{
        const oOk=(k.dataset.oct===undefined||k.dataset.oct==="")?true:(+k.dataset.oct===state.current.oct);
        if(k.dataset.letter===state.current.letter && oOk) k.classList.add("glow"); });
      say("This one! 👇","think");
    }
  }
}
function onBlack(midi,el){ if(state.locked) return; audioOn(); el.classList.add("press"); setTimeout(()=>el.classList.remove("press"),120);
  playPitch(freqMidi(midi)); say("Black key — those come later! 🎵","idle"); }
function bump(id){ const el=document.getElementById(id); el.classList.add("pop"); setTimeout(()=>el.classList.remove("pop"),420); }

/* ---------- confetti ---------- */
const cc=document.getElementById("confetti"), cx=cc.getContext("2d"); let parts=[], raf=null;
function sizeCanvas(){ cc.width=innerWidth; cc.height=innerHeight; } sizeCanvas(); addEventListener("resize",sizeCanvas);
function confetti(){ for(let i=0;i<90;i++){ parts.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*0.4,
  vx:(Math.random()-.5)*11,vy:-(Math.random()*12+6),g:0.35+Math.random()*0.2,r:Math.random()*7+4,c:CC[i%CC.length],
  rot:Math.random()*6,vr:(Math.random()-.5)*0.4,life:0}); } if(!raf) raf=requestAnimationFrame(tick); }
function tick(){ cx.clearRect(0,0,cc.width,cc.height); parts=parts.filter(p=>p.y<innerHeight+40 && p.life<200);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life++;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot); cx.fillStyle=p.c; cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6); cx.restore(); });
  if(parts.length) raf=requestAnimationFrame(tick); else { raf=null; cx.clearRect(0,0,cc.width,cc.height); } }

/* ---------- settings ---------- */
const overlay=document.getElementById("overlay");
const hintSwitch=document.getElementById("hintSwitch"), labelSwitch=document.getElementById("labelSwitch"), handSwitch=document.getElementById("handSwitch");
const moreOpts=document.getElementById("moreOpts"), moreToggle=document.getElementById("moreToggle");
function syncPanel(){
  hintSwitch.classList.toggle("on",state.colorHint); labelSwitch.classList.toggle("on",state.keyLabels); handSwitch.classList.toggle("on",state.handCue);
  document.querySelectorAll("#themeCards .tcard").forEach(c=>c.classList.toggle("on",c.dataset.theme===state.theme));
  document.querySelectorAll("#clefChoices .choice").forEach(c=>c.classList.toggle("on",c.dataset.clef===state.clef));
  document.querySelectorAll("#levelChoices .choice").forEach(c=>c.classList.toggle("on",c.dataset.level===state.level));
  document.querySelectorAll("#nameSysChoices .choice").forEach(c=>c.classList.toggle("on",c.dataset.namesys===state.naming));
  document.querySelectorAll("#modeChoices .choice").forEach(c=>c.classList.toggle("on",c.dataset.mode===state.mode));
}
document.querySelectorAll("#themeCards .tcard").forEach(c=>c.addEventListener("click",()=>{ state.theme=c.dataset.theme; applyTheme(state.theme); syncPanel(); }));
document.querySelectorAll("#clefChoices .choice").forEach(c=>c.addEventListener("click",()=>{state.clef=c.dataset.clef; syncPanel();}));
document.querySelectorAll("#levelChoices .choice").forEach(c=>c.addEventListener("click",()=>{state.level=c.dataset.level; syncPanel();}));
document.querySelectorAll("#nameSysChoices .choice").forEach(c=>c.addEventListener("click",()=>{state.naming=c.dataset.namesys; syncPanel();}));
document.querySelectorAll("#modeChoices .choice").forEach(c=>c.addEventListener("click",()=>{state.mode=c.dataset.mode; syncPanel();}));
hintSwitch.addEventListener("click",()=>{state.colorHint=!state.colorHint; syncPanel();});
labelSwitch.addEventListener("click",()=>{state.keyLabels=!state.keyLabels; syncPanel();});
handSwitch.addEventListener("click",()=>{state.handCue=!state.handCue; syncPanel();});
moreToggle.addEventListener("click",()=>{ const open=moreOpts.classList.toggle("collapsed")===false; moreToggle.textContent=open?"Fewer options ▴":"More options ▾"; });
document.getElementById("gearBtn").addEventListener("click",()=>{ syncPanel(); overlay.classList.remove("hidden"); rotateHint.classList.remove("show"); });
document.getElementById("startBtn").addEventListener("click",()=>{
  audioOn();
  store.set("ns2_theme",state.theme); store.set("ns2_clef",state.clef); store.set("ns2_level",state.level); store.set("ns2_namesys",state.naming);
  store.set("ns2_mode",state.mode); store.set("ns2_labels",state.keyLabels?"1":"0"); store.set("ns2_hint",state.colorHint?"1":"0"); store.set("ns2_hand",state.handCue?"1":"0");
  state.pool=buildPool(state.clef,state.level); overlay.classList.add("hidden"); buildAnswer(); nextNote(); updateRotateHint();
});

applyTheme(state.theme); buildAnswer(); syncPanel();
})();
</script>
